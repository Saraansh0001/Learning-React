<!DOCTYPE html>
<html>

  <head>
    <title>ChatBot</title>
  </head>

  <body>

    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">

      function ChatInput(){
        return(
          <>
            <input 
              placeholder="Send a message to chatbot" 
              size="50"
            />
            <button>Send</button>
          </> 
        );
      }

      
      function ChatMessages({message,sender}){
        return(
          <div>
            { 
              sender === 'robot' 
              && 
              <img src="robot.png" 
                alt="Robot"  
                width="50" 
              /> 
            }
            {message}
            { 
              sender === 'user' 
              && 
              <img 
                src="user.png" 
                alt="User" 
                width="50" 
              /> 
            }
          </div>
        );
      }

      function App()
      {
        return(
          <>
            <ChatInput />
            <ChatMessages 
              message="hello chatbot" 
              sender="user"
            />
            <ChatMessages 
              message="Hello , how can i help you?" 
              sender="robot"
            />
            <ChatMessages 
              message="what r u doing my friend" 
              sender="user"
            />
            <ChatMessages 
              message="nothing much how about you" 
              sender="robot"
            />
          </>
        );
      }

      // the message attribute is the prop which we are passing to the chatmessage component and we can use it in the chatmessage component as props.message
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
      
    </script>

  </body>

</html>
